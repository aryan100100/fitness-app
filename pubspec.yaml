name: fitness_app
description: "[HEALTH APP] — Intelligent health companion app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- [HEALTH APP] Core Dependencies ---

  # Supabase: backend, auth, and database
  supabase_flutter: ^2.8.4

  # Environment variables: loads .env file at runtime
  flutter_dotenv: ^5.2.1

  # Gemini AI: Google Generative AI for all AI features
  google_generative_ai: 0.4.6

  # Google Fonts: Inter typeface for design system
  google_fonts: ^6.2.1

  # Shimmer: skeleton loading animations
  shimmer: ^3.0.0

  # Smooth page indicator: dot indicator for onboarding
  smooth_page_indicator: ^1.2.0+3

  # --- Feature 3 & 4 Dependencies ---

  # Provider: state management for dashboard and food log
  provider: ^6.1.2

  # fl_chart: charting library (future chart screens)
  fl_chart: ^0.69.0

  # http: REST API calls to USDA, Nutritionix, OpenFoodFacts
  http: ^1.2.2

  # intl: date formatting for dashboard greeting and date display
  intl: ^0.20.2

  # image_picker: camera and gallery access for photo estimator
  image_picker: ^1.1.2

  # cached_network_image: cache food images from API responses
  cached_network_image: ^3.4.1

  # Feature 10: Barcode scanning via ML Kit (on-device, no data leaves device)
  mobile_scanner: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # .env is loaded at runtime by flutter_dotenv — NEVER commit real values
    - .env
    # Local Indian foods database — works fully offline
    - assets/indian_foods.json
    # Feature 10: Curated Indian packaged foods with barcodes
    - assets/indian_packaged_foods.json
